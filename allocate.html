<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F0EA" />
  <title>分配預算｜買家的你，如何挑選愛情？</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="allocate">
  <main class="app">
    <header class="topbar">
      <a class="text-link" href="index.html">回首頁</a>

      <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="切換頁面風格">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <section class="page-head float-in">
      <p class="eyebrow">STEP 2</p>
      <h1>分配你的 500 元</h1>
      <p>
        只會顯示你剛剛選到的條件。你可以用加減按鈕微調，也可以直接使用平均分配。
      </p>

      <div class="tiny-theme-panel" id="themePanel">
        <p>頁面風格</p>
        <div class="theme-dot-row">
          <button class="theme-dot warm" data-theme-choice="warm" aria-label="暖粉紙感"></button>
          <button class="theme-dot cream" data-theme-choice="cream" aria-label="奶油甜感"></button>
          <button class="theme-dot blue" data-theme-choice="blue" aria-label="清透藍"></button>
          <button class="theme-dot green" data-theme-choice="green" aria-label="森林綠"></button>
          <button class="theme-dot violet" data-theme-choice="violet" aria-label="紫霧感"></button>
        </div>
      </div>
    </section>

    <section class="budget-card">
      <div>
        <span>已使用</span>
        <strong id="usedBudget">0</strong>
      </div>

      <div>
        <span>剩餘</span>
        <strong id="leftBudget">500</strong>
      </div>

      <div>
        <span>已選</span>
        <strong id="chosenCount">0</strong>
      </div>
    </section>

    <section class="tool-row">
      <button id="equalBtn" class="ghost-btn" type="button">平均分配</button>
      <button id="clearBtn" class="ghost-btn" type="button">清空金額</button>
      <a class="ghost-link" href="select.html">重新選條件</a>
    </section>

    <section id="allocationList" class="allocation-list"></section>

    <section class="action-stack">
      <button id="resultBtn" class="primary-btn" type="button">查看我的分數</button>
      <a class="secondary-link" href="select.html">回上一頁調整條件</a>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
