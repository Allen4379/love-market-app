<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F1EC" />
  <title>買家的你，如何挑選愛情？</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="index">
  <main class="app">
    <header class="topbar">
      <span class="brand">Love Market</span>

      <select id="themeSelect" aria-label="選擇頁面風格">
        <option value="warm">暖粉紙感</option>
        <option value="mono">黑白極簡</option>
        <option value="blue">清透藍</option>
        <option value="green">森林綠</option>
        <option value="violet">紫霧漸層</option>
      </select>
    </header>

    <section class="cover-card">
      <p class="eyebrow">LOVE MARKET TEST</p>

      <h1>買家的你，<br />如何挑選愛情？</h1>

      <p class="cover-text">
        你有 500 元預算，可以自由分配給你最重視的伴侶條件。
        每一筆投入，都會變成你的愛情條件分數。
      </p>

      <div class="cover-tags">
        <span>安全與信任</span>
        <span>溝通修復</span>
        <span>親密陪伴</span>
        <span>生活價值觀</span>
      </div>

      <section class="theme-panel">
        <p class="section-title">選擇頁面風格</p>

        <div class="theme-grid">
          <button class="theme-choice" data-theme-choice="warm">暖粉紙感</button>
          <button class="theme-choice" data-theme-choice="mono">黑白極簡</button>
          <button class="theme-choice" data-theme-choice="blue">清透藍</button>
          <button class="theme-choice" data-theme-choice="green">森林綠</button>
          <button class="theme-choice" data-theme-choice="violet">紫霧漸層</button>
        </div>
      </section>

      <button id="startBtn" class="primary-btn">開始分配 500 元</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
