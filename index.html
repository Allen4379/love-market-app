<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F0EA" />
  <title>買家的你，如何挑選愛情？</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="index">
  <main class="app">
    <header class="topbar">
      <a class="brand" href="index.html">Love Market</a>

      <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="切換頁面風格">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <section class="hero-card float-in">
      <div class="soft-orb orb-one"></div>
      <div class="soft-orb orb-two"></div>

      <p class="eyebrow">LOVE MARKET TEST</p>

      <h1>買家的你，<br />如何挑選愛情？</h1>

      <p class="hero-text">
        如果愛情像一場市場選擇，你只有 500 元，也只能挑 5 個條件。
        你會把預算投在哪些人身上？
      </p>

      <div class="tiny-theme-panel" id="themePanel">
        <p>頁面風格</p>
        <div class="theme-dot-row">
          <button class="theme-dot warm" data-theme-choice="warm" aria-label="暖粉紙感"></button>
          <button class="theme-dot cream" data-theme-choice="cream" aria-label="奶油甜感"></button>
          <button class="theme-dot blue" data-theme-choice="blue" aria-label="清透藍"></button>
          <button class="theme-dot green" data-theme-choice="green" aria-label="森林綠"></button>
          <button class="theme-dot violet" data-theme-choice="violet" aria-label="紫霧感"></button>
        </div>
      </div>

      <div class="hero-tags">
        <span>最多選 5 個條件</span>
        <span>分配 500 元預算</span>
        <span>產生分享結果</span>
      </div>

      <a class="primary-link" href="select.html">開始挑選</a>
    </section>

    <section class="info-card fade-up">
      <h2>玩法</h2>

      <div class="steps">
        <div>
          <strong>1</strong>
          <p>先從所有條件中選出最多 5 個你最重視的項目。</p>
        </div>

        <div>
          <strong>2</strong>
          <p>把 500 元預算分配給你選出的條件。</p>
        </div>

        <div>
          <strong>3</strong>
          <p>產生分數結果，分享給朋友看你的選擇。</p>
        </div>
      </div>
    </section>

    <p class="privacy-note">
      本測驗資料只會儲存在你的瀏覽器中，不會上傳到伺服器。
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
