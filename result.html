<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F0EA" />
  <title>我的分數結果｜買家的你，如何挑選愛情？</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body data-page="result">
  <main class="app">
    <header class="topbar">
      <a class="text-link" href="index.html">回首頁</a>

      <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="切換頁面風格">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <section class="page-head result-head float-in">
      <p class="eyebrow">RESULT</p>
      <h1>我的愛情條件分數</h1>
      <p id="resultSummary"></p>

      <div class="tiny-theme-panel" id="themePanel">
        <p>頁面風格</p>
        <div class="theme-dot-row">
          <button class="theme-dot warm" data-theme-choice="warm" aria-label="暖粉紙感"></button>
          <button class="theme-dot cream" data-theme-choice="cream" aria-label="奶油甜感"></button>
          <button class="theme-dot blue" data-theme-choice="blue" aria-label="清透藍"></button>
          <button class="theme-dot green" data-theme-choice="green" aria-label="森林綠"></button>
          <button class="theme-dot violet" data-theme-choice="violet" aria-label="紫霧感"></button>
        </div>
      </div>
    </section>

    <section class="summary-grid">
      <div class="summary-mini-card">
        <span>使用預算</span>
        <strong id="usedBudgetText">0 / 500</strong>
      </div>

      <div class="summary-mini-card">
        <span>最高面向</span>
        <strong id="topDimensionText">尚未分配</strong>
      </div>

      <div class="summary-mini-card">
        <span>已選條件</span>
        <strong id="selectedCountText">0 項</strong>
      </div>

      <div class="summary-mini-card">
        <span>前三項佔比</span>
        <strong id="topThreeRatioText">0%</strong>
      </div>
    </section>

    <section class="result-section">
      <h2>面向分數</h2>
      <div id="dimensionScores" class="score-bars"></div>
    </section>

    <section class="result-section">
      <h2>投入最高的條件</h2>
      <ol id="topItems" class="plain-list"></ol>
    </section>

    <section class="result-section">
      <h2>分數報告</h2>
      <p id="scoreReport" class="report-text"></p>
    </section>

    <section class="share-panel">
      <button id="shareLinkBtn" class="primary-btn" type="button">分享我的分數連結</button>
      <button id="downloadStoryBtn" class="secondary-btn" type="button">儲存 IG 限動圖</button>
      <button id="copyTextBtn" class="secondary-btn" type="button">複製分數文字</button>
    </section>

    <section class="action-stack">
      <a class="secondary-link" href="allocate.html">回去調整金額</a>
      <a class="secondary-link" href="select.html">重新選條件</a>
    </section>

    <section class="capture-zone" aria-hidden="true">
      <article id="storyCard" class="story-card">
        <div class="story-top">
          <p>LOVE MARKET RESULT</p>
          <span>500 BUDGET</span>
        </div>

        <h2>我的愛情條件分數</h2>

        <div class="story-meta">
          <div>
            <span>使用預算</span>
            <strong id="storyUsedBudget">0 / 500</strong>
          </div>

          <div>
            <span>最高面向</span>
            <strong id="storyTopDimension">尚未分配</strong>
          </div>
        </div>

        <div class="story-score-list" id="storyDimensionScores"></div>

        <div class="story-top-list">
          <p>投入最高條件</p>
          <ol id="storyTopItems"></ol>
        </div>

        <p class="story-footer">買家的你，如何挑選愛情？</p>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
